<style>
  :root{
    --bg:#0a0e2a; --panel:#0f1433; --panelhd:#1a2150;
    --blue:#1f8ce8; --blue-l:#7fb8e6; --blue-d:#1565b8;
    --purple:#c026d3; --purple2:#a21caf;
    --gray:#8a8f9e; --headband:#1a2780; --kpibg:#141a3d;
    --ink:#e8ecf5; --muted:#9aa3c0; --grid:#232a55;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Segoe UI', Tahoma, Arial, sans-serif;
    background:#05071a; color:var(--ink);
    display:flex; justify-content:center; padding:16px;
  }
  .stage{ width:1280px; max-width:100%; }
  .canvas{
    position:relative; width:1280px; height:720px;
    background:var(--bg);
    transform-origin:top right;
    box-shadow:0 4px 30px rgba(0,0,0,.5);
    border-radius:4px; overflow:hidden;
  }
  .v{ position:absolute; }
  /* header */
  .hdr-left{ left:0; top:0; width:262px; height:58px;
    background:linear-gradient(90deg,#1a2780,#0f1433);
    display:flex; align-items:center; padding-right:24px;
    font-size:24px; font-weight:800; color:#fff; letter-spacing:1px;}
  .hdr-time{ left:280px; top:18px; font-size:14px; color:var(--muted);}
  .logo{ left:1070px; top:8px; width:190px; height:46px;
    background-size:contain; background-repeat:no-repeat; background-position:center;}

  /* KPI cards */
  .kpi{ background:var(--kpibg); border:1px solid #232a55; border-radius:5px;
    display:flex; flex-direction:column; justify-content:center;
    align-items:center; text-align:center;}
  .kpi .val{ font-size:34px; font-weight:300; color:var(--blue); line-height:1;}
  .kpi .lbl{ font-size:14px; color:var(--ink); margin-top:8px;}

  .ptitle{ position:absolute; text-align:center; font-size:15px; font-weight:700;
    color:var(--ink); }
  .divider{ position:absolute; background:var(--grid); }
  .cwrap{ position:absolute; }
  .cwrap canvas{ position:absolute !important; inset:0; width:100% !important; height:100% !important;}
</style>

<script>
/* ====== EDIT YOUR DATA HERE ====== */
const DATA = {
  timestamp: "6/16/2026 1:14:27 PM",
  kpis: { count:"67", completion:"77.61%", onTime:"94.00%", delay:"13.56%" },

  status:   { labels:["Completed","On Hold","In Progress","Not Started"], values:[52,10,4,1] },
  division: { labels:["MSD","SCOC","Agency","MSD & SCOC"], values:[36,17,13,0] },
  owner:    {
    labels:["Saad Alamri","Mohammed ...","Ali alfayez","Muslih Al-Anzi","Talal Alenazi",
            "Abudallah Al...","Amana Wah...","Fahad Al-Ha...","Musleh Al-Enzi","Tareq al Dar...",
            "Abdullah al ...","Abdullah Ald...","Abdullah Al-...","Abdullah Al..."],
    values:[15,9,7,7,6,3,2,2,2,2,1,1,1,1] },
  duration: {
    labels:["360-450 days","90-180 days","270-360 days","180-270 days","450-540 days",
            "720-810 days","0-90 days","630-720 days","810-900 days","900-990 days","990-1080 days"],
    values:[17,17,7,6,4,4,3,2,1,1,1] },
  boq:      { labels:["Yes","No"], values:[54,13] },
  manager:  {
    labels:["Khalid Al Amri","Abdulkrim Awaji","Faisal Al-Anazi","Osama Alyousef","Haneen Alwotibani",
            "Bader Almalki","Amar Abu-Nas...","Shatha Almuarik","Talal Alhamoud","Majed AlHakami",
            "Dalal Abodaheer","Abdula Ben Malik","Aisha AlShehri","Muntaha AlQahtani","Nasir Alnukhilan","Shouq Alotaibi"],
    values:[10,9,8,7,6,5,4,4,4,3,2,1,1,1,1,1] },
  risk: {
    divisions:["MSD","SCOC","Agency","MSD & SCOC"],
    series:[
      { name:"High",   color:"#c026d3", values:[4,3,4,0] },
      { name:"Low",    color:"#7fb8e6", values:[19,10,8,0] },
      { name:"Medium", color:"#1f8ce8", values:[9,4,1,1] },
      { name:"TBD",    color:"#8a8f9e", values:[4,0,0,0] }
    ]
  }
};
/* ================================= */

document.getElementById('ts').textContent = DATA.timestamp;
k1.textContent=DATA.kpis.count; k2.textContent=DATA.kpis.completion;
k3.textContent=DATA.kpis.onTime; k4.textContent=DATA.kpis.delay;

Chart.defaults.color = '#9aa3c0';
Chart.defaults.font.size = 10;
const GRID='#232a55';
const axisOpts=(showGrid=true)=>({
  responsive:true, maintainAspectRatio:false,
  plugins:{ legend:{display:false},
    datalabels:{}, tooltip:{enabled:true} },
  scales:{
    x:{ grid:{display:false}, ticks:{color:'#9aa3c0'} },
    y:{ grid:{color:GRID, display:showGrid}, ticks:{color:'#9aa3c0'}, beginAtZero:true }
  }
});

// value labels plugin (simple)
const valueLabels = {
  id:'valueLabels',
  afterDatasetsDraw(chart){
    const {ctx}=chart;
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      if(meta.type!=='bar') return;
      meta.data.forEach((el,i)=>{
        const v=ds.data[i]; if(!v) return;
        ctx.save(); ctx.fillStyle='#e8ecf5'; ctx.font='bold 10px Segoe UI';
        ctx.textAlign='center';
        if(chart.options.indexAxis==='y'){
          ctx.textAlign='left'; ctx.fillText(v, el.x+5, el.y+3);
        } else {
          ctx.fillText(v, el.x, el.y-4);
        }
        ctx.restore();
      });
    });
  }
};

new Chart(c_status,{type:'bar',data:{labels:DATA.status.labels,
  datasets:[{data:DATA.status.values,backgroundColor:'#1f8ce8',barThickness:46}]},
  options:axisOpts(false), plugins:[valueLabels]});

new Chart(c_division,{type:'doughnut',data:{labels:DATA.division.labels,
  datasets:[{data:DATA.division.values,backgroundColor:['#1f8ce8','#7fb8e6','#c026d3','#a9d2f0'],borderWidth:0}]},
  options:{responsive:true,maintainAspectRatio:false,cutout:'62%',
    plugins:{legend:{position:'right',labels:{color:'#e8ecf5',boxWidth:10,font:{size:11},usePointStyle:true,pointStyle:'circle'}}}}});

new Chart(c_owner,{type:'bar',data:{labels:DATA.owner.labels,
  datasets:[{data:DATA.owner.values,backgroundColor:'#1f8ce8'}]},
  options:{...axisOpts(false),indexAxis:'y',
    scales:{x:{display:false,grid:{display:false}},y:{grid:{display:false},ticks:{color:'#cdd5ea',font:{size:10},autoSkip:false}}}},
  plugins:[valueLabels]});

new Chart(c_duration,{type:'bar',data:{labels:DATA.duration.labels,
  datasets:[{data:DATA.duration.values,backgroundColor:'#1f8ce8'}]},
  options:{...axisOpts(false),
    scales:{x:{grid:{display:false},ticks:{color:'#9aa3c0',font:{size:8},maxRotation:45,minRotation:45}},
            y:{display:false,grid:{display:false}}}},
  plugins:[valueLabels]});

new Chart(c_boq,{type:'doughnut',data:{labels:DATA.boq.labels,
  datasets:[{data:DATA.boq.values,backgroundColor:['#1f8ce8','#c026d3'],borderWidth:0}]},
  options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
    plugins:{legend:{position:'right',labels:{color:'#e8ecf5',boxWidth:10,font:{size:11},usePointStyle:true,pointStyle:'circle'}}}}});

new Chart(c_manager,{type:'bar',data:{labels:DATA.manager.labels,
  datasets:[{data:DATA.manager.values,backgroundColor:'#c026d3'}]},
  options:{...axisOpts(false),
    scales:{x:{grid:{display:false},ticks:{color:'#cdd5ea',font:{size:9}}},
            y:{display:false,grid:{display:false}}}},
  plugins:[valueLabels]});

new Chart(c_risk,{type:'bar',data:{labels:DATA.risk.divisions,
  datasets:DATA.risk.series.map(s=>({label:s.name,data:s.values,backgroundColor:s.color}))},
  options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{color:'#e8ecf5',boxWidth:8,font:{size:10},usePointStyle:true,pointStyle:'circle'}}},
    scales:{x:{grid:{display:false},ticks:{color:'#cdd5ea',font:{size:10,weight:'bold'}}},
            y:{display:false,grid:{display:false}}}},
  plugins:[valueLabels]});

function fit(){
  const stage=document.querySelector('.stage');
  const cv=document.getElementById('canvas');
  const w=stage.clientWidth;
  const scale=Math.min(1, w/1280);
  cv.style.transform='scale('+scale+')';
  stage.style.height=(720*scale)+'px';
}
window.addEventListener('resize',fit); fit();
</script>
</body>
